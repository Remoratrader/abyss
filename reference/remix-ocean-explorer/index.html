<!DOCTYPE html>
<html>
<head>
  <title>Remix: Ocean Explorer </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; outline: none !important; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0d1628; }
    #root { position: relative; z-index: 1; }
    canvas { display: block; outline: none !important; }
    #canvas { position: absolute; top: 0; left: 0; }
    @keyframes pip-pulse {
      0%   { box-shadow: 0 0 0px 0px rgba(0,220,255,0.0); }
      50%  { box-shadow: 0 0 6px 4px rgba(0,220,255,0.55); }
      100% { box-shadow: 0 0 0px 0px rgba(0,220,255,0.0); }
    }
    .pip-active {
      animation: pip-pulse 1.6s ease-in-out infinite;
    }

    /* ── Ocean Explorer parallax title (hidden — now rendered in 3D scene) ── */
    #parallax-title { display: none; }

    /* ── Global UI text polish ── */
    button, .pip-active, [style*="font-family"] {
      text-shadow: 0 0 6px rgba(0, 180, 255, 0.25);
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <!-- Parallax background title -->
  <div id="parallax-title">
    <div class="title-main">Ocean Explorer</div>
    <div class="title-sub">Dive into the deep</div>
  </div>

  <div id="root"></div>
  <script type="module" src="/scene.js"></script>
</body>
</html>
